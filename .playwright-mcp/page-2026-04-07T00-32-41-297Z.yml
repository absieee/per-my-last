              - heading "Gamemodes" [level=3] [ref=e136]
              - paragraph [ref=e137]:
                - strong [ref=e138]: Default/Normal
              - list [ref=e139]:
                - listitem [ref=e140]: Under the default settings- or slightly modified in a public lobby… its generally as described from Gameplay Loop- Slackers can see other slackers, around 30% of all employees will become slackers, slacker difficulty is at 50% which roughly translates to how much the bar moves when a slacker slacks, The manager can be replaced, and one single person and their tasks generally dont contribute MUCH to the bar, it takes a lot of people to make progress in any one direction. Sprinting is off, and assistants and janitors exist.
              - paragraph [ref=e141]: In this mode it is pure vanilla, and up to the kind of lobby and manager you get
              - paragraph [ref=e142]:
                - strong [ref=e143]: Fast
              - list [ref=e144]:
                - listitem [ref=e145]: Like default/normal- but meetings are shorter, and slackers have it a bit easier/faster
              - paragraph [ref=e146]:
                - strong [ref=e147]: Custom
                - text: ":"
              - list [ref=e148]:
                - listitem [ref=e149]: In custom, you can apply your own personal settings to make your own lobby style.
                - listitem [ref=e150]: Some food for thought is doing something like this-
                - listitem [ref=e151]: making the tasks vital to be done (higher productivity, lower slack difficulty) except you as the manager use crazy tactics such as locking bathroom and breakroom… and assigning employees desks… and require them to call or email you to leave their offices to do things…
                - listitem [ref=e152]: Theres more you can do… but this is just a placeholder to get you thinking while we invent our own.
