            - generic [ref=e54]:
              - paragraph [ref=e55]: You can find all the tips, maps, game modes, roles and many more details about Dale and Dawson in this guide.
              - generic [ref=e56]:
                - generic [ref=e57]: Dale and Dawson Stationery Supplies Guides
                - link "Surviving the Meeting Dale and Dawson Slacker Guide" [ref=e59] [cursor=pointer]:
                  - /url: https://ninewiki.com/guide/dale-and-dawson-slacker-guide/
                  - img "Surviving the Meeting" [ref=e61]
                  - heading "Dale and Dawson Slacker Guide" [level=4] [ref=e62]
              - heading "Dale and Dawson Guide" [level=2] [ref=e63]
              - paragraph [ref=e64]: Details and tips for beginners from the Dale and Dawson Stationery Supplies Guide.
              - heading "Roles" [level=3] [ref=e65]
              - paragraph [ref=e66]: "Here are all roles:"
              - heading "Manager" [level=4] [ref=e67]
              - paragraph [ref=e68]:
                - text: The manager is responsible for curating all the employees and sussing out potential slackers. They have their own private office with master keys in the office for the whole building. They are the only employee that is “Special” and can call meetings, fire people, etc.
                - text: The manager can be voted out- or fired… in which they become a janitor if there isnt one, and a spectator if there is. The manager is always a “Specialist”
              - heading "Assistant" [level=4] [ref=e69]
              - paragraph [ref=e70]: Contrary to popular belief- the assistant is not a given position- or eliminates their previous tasks… as the assistants are appointed by the manager. The assistant can be a slacker or specialist…
              - heading "Specialist" [level=4] [ref=e71]
              - paragraph [ref=e72]: The specialist is the hard worker all managers want- they are mainly tasked to do productive tasks but can also be assigned slacker tasks based on lobby settings[see Gamemode].
              - heading "Slackers" [level=4] [ref=e73]
              - paragraph [ref=e74]:
                - text: The slackers are the pretend hard workers… their goal- is to keep their job and do minimum work. They will not be assigned any specialist tasks but can fake doing them to appear as a non slacker. These workers have various tasks to complete in order to slack, and shouldnt be caught doing them… similar to specialists doing them. See Tasks and check out our
                - link "slacker guide" [ref=e75] [cursor=pointer]:
                  - /url: https://ninewiki.com/guide/dale-and-dawson-slacker-guide/
                - text: .
              - heading "Janitor" [level=4] [ref=e76]
              - paragraph [ref=e77]: Once somebody has been “fired” they are first demoted to a Janitor if there is not a janitor already. The janitor can be fired again if they refuse to fulfill their job. They will then become the next, final role.
              - heading "Spectator (Fired)" [level=4] [ref=e78]
              - paragraph [ref=e79]: Once fired you enter a spectator cam, where you can use E and Q to go up and down. They can see everybodys roles but cant speak to anybody. This is losing… unless your previously assigned team wins.
              - heading "Gameplay Loop" [level=3] [ref=e80]
              - paragraph [ref=e81]: Dale & Dawson Stationery Supplies plunges you into the heart of an early 2000s office drama where your role, be it a Manager, a Specialist, or a Slacker, is randomly assigned at the game’s outset. Set within the confines of a seemingly typical stationery company, players are thrust into a covert battle of productivity versus procrastination. Specialists strive to propel the company forward through task completion, while Slackers, blending in under the guise of diligence, aim to shirk their duties without raising suspicion. The Manager, caught in the middle, must unravel this facade to weed out the Slackers, with only their judgment and the whispers of their employees to guide them.
              - paragraph [ref=e82]: This section will be fleshed out to include a bunch of the nuances not mentioned in any of the other sections.
              - heading "Tasks" [level=3] [ref=e83]
              - figure [ref=e84]:
                - img "Tasks" [ref=e85]
                - button "Enlarge" [ref=e86]:
                  - img [ref=e87]
              - paragraph [ref=e89]: Here we can see all the tasks in the game… in blue is specialist only tasks… people doing these are not slacking, and are considered productive… due note- feeding the cats shouldnt be confusing with petting the cats.
              - paragraph [ref=e90]: "In Red are slacker tasks- they can be assigned to anybody: in regards to lobby settings. Seeing people do these tasks is considered slacking, but not a slacker… if you see any one person doing these tasks back to back to back- they are a slacker and should be fired."
              - paragraph [ref=e91]: In black are slacker only tasks- only assigned to slackers, and cant be done by specialists. Seeing these tasks be done guarantees they are a slacker and is safe to fire. Due note- trash bin and servers have delay… around 5ish (will confirm another time) seconds… the action will be done in order for them to flee the area. However; infecting a computer is instant.
              - paragraph [ref=e92]: Tasks not mentioned are also important such as; emailing employees, calling people, and/or setting up your workstation/prepping, etc. There may be more detail added to this in particular later.
              - heading "Maps" [level=3] [ref=e93]
