              - text: "]"
          - paragraph [ref=e254]:
            - text: Players perform tasks in an office space and can be assigned one of three roles at the beginning of a round. Specialists perform positive tasks, while slackers perform negative tasks. The goal of the specialists is for the manager to fire all of the slackers. The slackers can win a round if enough specialists are fired, or if they perform enough tasks to outperform the specialists.
            - superscript [ref=e255]:
              - link "[3]" [ref=e256] [cursor=pointer]:
                - /url: "#cite_note-PCG-3"
          - paragraph [ref=e257]:
            - text: If a manager does not fire an employee in a certain timeframe, then they are automatically fired and replaced by another player.
